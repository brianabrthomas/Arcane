[profile.default]
src     = "src"
out     = "out"
libs    = ["lib"]
test    = "test"
script  = "script"
solc    = "0.8.20"
via_ir  = true
optimizer = true
optimizer_runs = 200

# Arc Testnet RPC
[rpc_endpoints]
arc_testnet = "https://rpc.testnet.arc.network"
local       = "http://localhost:8545"

# Etherscan-style verification (ArcScan)
[etherscan]
arc_testnet = { key = "${ARCSCAN_API_KEY}", url = "https://testnet.arcscan.app/api" }
